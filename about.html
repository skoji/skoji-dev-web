<h2>群島舎について</h2>

<p>群島舎は<a href="https://skoji.jp">小嶋智</a>の個人事業主としての屋号です。skojiというIDは昔から使っていて、だからここのドメインもskoji.devです。<strong>S</strong>atoshi <strong>Koji</strong>maからとりました。ところで、ダルマチア語でškojiは「島々」という意味だそうです。群島です。</p>
